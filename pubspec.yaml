name: mycycle
description: MyCycle — персональное приложение для отслеживания менструального цикла.
publish_to: 'none'
version: 1.7.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  sqflite: ^2.4.1
  path: ^1.9.0
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3
  intl: ^0.20.2
  uuid: ^4.5.1
  fl_chart: ^0.69.2
  table_calendar: ^3.1.3
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  file_picker: ^8.1.6
  permission_handler: ^11.3.1
  package_info_plus: ^8.1.2
  http: ^1.2.2
  open_filex: ^4.6.0
  home_widget: ^0.7.0
  image_picker: ^1.1.2
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
