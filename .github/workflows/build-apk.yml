name: Build and Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/mycycle-release.jks

      - name: Read version name
        id: version
        run: |
          VERSION_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d+ -f1)
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Check release notes
        run: |
          if [ ! -s release_notes/whats_new.txt ]; then
            echo "Файл release_notes/whats_new.txt пуст."
            echo "Опишите изменения перед push в main."
            exit 1
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        env:
          ANDROID_KEYSTORE_PATH: mycycle-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.name }} \
            --build-number=${{ github.run_number }}

      - name: Prepare release files
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk Florea.apk
          TAG="v${{ steps.version.outputs.name }}.${{ github.run_number }}"
          jq -n \
            --argjson versionCode ${{ github.run_number }} \
            --arg versionName "${{ steps.version.outputs.name }}" \
            --arg apkUrl "https://github.com/${{ github.repository }}/releases/download/${TAG}/Florea.apk" \
            --rawfile notes release_notes/whats_new.txt \
            '{versionCode: $versionCode, versionName: $versionName, apkUrl: $apkUrl, notes: $notes}' \
            > manifest.json
          {
            echo "Сборка ${{ github.run_number }} · ${TAG}"
            echo ""
            cat release_notes/whats_new.txt
            echo ""
            echo "---"
            echo "Установите Florea.apk поверх текущей версии Florea — данные сохранятся."
            echo "Старую MyCycle замените установкой Florea и Restore из Backup v2."
          } > release_body.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.name }}.${{ github.run_number }}
          name: Florea ${{ steps.version.outputs.name }} (build ${{ github.run_number }})
          body_path: release_body.md
          files: |
            Florea.apk
            manifest.json
          make_latest: true
